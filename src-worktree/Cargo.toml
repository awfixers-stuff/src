lints.workspace = true

[package]
name = "src-worktree"
version = "0.49.0"
repository = "https://github.com/GitoxideLabs/gitoxide"
license = "MIT OR Apache-2.0"
description = "A crate of the gitoxide project for shared worktree related types and utilities."
authors = ["Sebastian Thiel <sebastian.thiel@icloud.com>"]
edition = "2021"
include = ["src/**/*", "LICENSE-*"]
rust-version = "1.82"
autotests = false

[lib]
doctest = false

[features]
default = ["attributes"]
## Enable support for the SHA-1 hash by enabling the respective feature in the `src-hash` crate.
sha1 = ["src-hash/sha1"]
## Instantiate stacks that can access `.gitattributes` information.
attributes = ["dep:src-attributes", "dep:src-validate"]
## Data structures implement `serde::Serialize` and `serde::Deserialize`.
serde = ["dep:serde", "bstr/serde", "src-index/serde", "src-hash/serde", "src-object/serde", "src-attributes?/serde", "src-ignore/serde"]

[dependencies]
src-index = { version = "^0.48.0", path = "../src-index" }
src-fs = { version = "^0.19.1", path = "../src-fs" }
src-hash = { version = "^0.22.1", path = "../src-hash" }
src-object = { version = "^0.57.0", path = "../src-object" }
src-glob = { version = "^0.24.0", path = "../src-glob" }
src-path = { version = "^0.11.1", path = "../src-path" }
src-attributes = { version = "^0.31.0", path = "../src-attributes", optional = true }
src-validate = { version = "^0.11.0", path = "../src-validate", optional = true }
src-ignore = { version = "^0.19.0", path = "../src-ignore" }

serde = { version = "1.0.114", optional = true, default-features = false, features = ["derive"] }
bstr = { version = "1.12.0", default-features = false }

document-features = { version = "0.2.0", optional = true }

[dev-dependencies]
src-hash = { path = "../src-hash", features = ["sha1"] }

[package.metadata.docs.rs]
features = ["sha1", "document-features", "serde"]

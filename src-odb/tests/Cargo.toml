lints.workspace = true

[package]
name = "src-odb-tests"
version = "0.0.0"
repository = "https://github.com/GitoxideLabs/gitoxide"
authors = ["Sebastian Thiel <sebastian.thiel@icloud.com>"]
license = "MIT OR Apache-2.0"
description = "Tests for src-odb with feature-toggle support"
edition = "2021"
rust-version = "1.82"
publish = false

[features]
src-features-parallel = ["src-features/parallel"]

[[test]]
name = "integrate"
path = "integrate.rs"

[dev-dependencies]
src-odb = { path = ".." }
src-features = { path = "../../src-features" }
src-hash = { path = "../../src-hash" }
src-date = { path = "../../src-date" }
src-object = { path = "../../src-object" }
src-pack = { path = "../../src-pack" }

src-testtools = { path = "../../tests/tools" }
src-actor = { path = "../../src-actor" }
pretty_assertions = "1.0.0"
filetime = "0.2.27"
maplit = "1.0.2"
crossbeam-channel = "0.5.15"

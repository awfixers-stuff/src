lints.workspace = true

[package]
name = "src-config-tests"
version = "0.0.0"
repository = "https://github.com/GitoxideLabs/gitoxide"
description = "Tests for the src-config crate"
license = "MIT OR Apache-2.0"
authors = ["Edward Shen <code@eddie.sh>"]
edition = "2021"
rust-version = "1.82"
publish = false


[[test]]
name = "config"
path = "config/mod.rs"

[[test]]
name = "mem"
path = "mem.rs"

[dev-dependencies]
src-config = { path = ".." }
src-testtools = { path = "../../tests/tools" }
src-ref = { path = "../../src-ref" }
src-path = { path = "../../src-path" }
src-sec = { path = "../../src-sec" }
serial_test = { version = "3.4.0", default-features = false }
bstr = { version = "1.12.0", default-features = false, features = ["std"] }

bytesize = "2.3.1"
cap = { version = "0.1.2", features = ["stats"] }

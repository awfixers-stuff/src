lints.workspace = true

[package]
name = "src-submodule"
version = "0.27.0"
repository = "https://github.com/GitoxideLabs/gitoxide"
license = "MIT OR Apache-2.0"
description = "A crate of the gitoxide project dealing git submodules"
authors = ["Sebastian Thiel <sebastian.thiel@icloud.com>"]
edition = "2021"
rust-version = "1.82"
include = ["src/**/*", "LICENSE-*"]

[lib]
doctest = false

[features]
## Enable support for the SHA-1 hash by forwarding the feature to dependencies.
sha1 = ["src-config/sha1", "src-refspec/sha1"]

[dependencies]
src-pathspec = { version = "^0.16.0", path = "../src-pathspec" }
src-refspec = { version = "^0.38.0", path = "../src-refspec" }
src-config = { version = "^0.53.0", path = "../src-config" }
src-path = { version = "^0.11.1", path = "../src-path" }
src-url = { version = "^0.35.2", path = "../src-url" }

bstr = { version = "1.12.0", default-features = false }
thiserror = "2.0.18"

[dev-dependencies]
src-testtools = { path = "../tests/tools" }
src-features = { path = "../src-features", features = ["walkdir"] }

[package.metadata.docs.rs]
features = ["sha1"]

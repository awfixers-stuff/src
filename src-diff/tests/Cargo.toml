lints.workspace = true

[package]
name = "src-diff-tests"
version = "0.0.0"
publish = false
repository = "https://github.com/GitoxideLabs/gitoxide"
license = "MIT OR Apache-2.0"
description = "Tests for the src-diff crate"
authors = ["Sebastian Thiel <sebastian.thiel@icloud.com>"]
edition = "2021"
rust-version = "1.82"

[[test]]
doctest = false
name = "diff"
path = "diff/main.rs"

[dev-dependencies]
src-diff = { path = "..", features = ["blob-experimental"] }
src-index = { path = "../../src-index" }
src-pathspec = { path = "../../src-pathspec" }
src-hash = { path = "../../src-hash" }
src-fs = { path = "../../src-fs" }
src-worktree = { path = "../../src-worktree" }
src-object = { path = "../../src-object" }
src-odb = { path = "../../src-odb" }
src-filter = { path = "../../src-filter" }
src-traverse = { path = "../../src-traverse" }
src-testtools = { path = "../../tests/tools" }

insta = "1.46.3"
shell-words = "1"
pretty_assertions = "1.4.0"
